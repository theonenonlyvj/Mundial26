# Split deploy: an always-on static site (the SPA, served from Render's CDN) +
# a free Node web service for the API. The static site never spins down, so the
# page loads instantly; only the API cold-starts (~30s), which the in-app
# cold-start banner covers. See DEPLOY.md for the dashboard wiring steps.
services:
  # --- API (free web service; cold-starts after ~15 min idle) ---
  - type: web
    name: mundial26-api
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: FOOTBALL_DATA_API_KEY
        sync: false
      - key: NODE_ENV
        value: production
      # Pin Node >= 20.12 so `--env-file-if-exists` (used in npm start) is supported.
      - key: NODE_VERSION
        value: "22"
      # The static-site origin allowed to call this API (set in the dashboard
      # once the static site has a URL). Enables CORS for that one origin.
      - key: CLIENT_ORIGIN
        sync: false

  # --- SPA (static site; CDN, always-on, no spin-down) ---
  - type: static
    name: mundial26
    # --include=dev so vite/react build plugins (devDependencies) are installed.
    buildCommand: npm install --include=dev && npm run build
    staticPublishPath: ./dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      # Absolute URL of the API service above, baked into the build (set in the
      # dashboard once the API has a URL). Unset locally -> dev uses the vite proxy.
      - key: VITE_API_URL
        sync: false

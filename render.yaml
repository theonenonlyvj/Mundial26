# This blueprint manages ONLY the static SPA (always-on CDN).
#
# The API runs on the pre-existing `mundial26` web service
# (https://mundial26-y28p.onrender.com), which was created by hand on the first
# deploy — OUTSIDE this blueprint. A blueprint can't adopt a hand-made service by
# name, so declaring the web service here just made Render create a DUPLICATE.
# We therefore configure the API service directly in its own dashboard (env vars
# like CLIENT_ORIGIN), and keep this file scoped to the static frontend only.
services:
  # --- SPA static site (CDN, always-on, no spin-down) ---
  # The fast URL to share. Calls the existing -y28p web service for data.
  # Static sites use type:web + runtime:static in the current Render schema.
  - type: web
    runtime: static
    name: mundial26-app
    # --include=dev so vite/react build plugins (devDependencies) are installed.
    buildCommand: npm install --include=dev && npm run build
    staticPublishPath: ./dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      # Absolute URL of the existing API service, baked into the build (set in the
      # dashboard). Unset locally -> dev uses the vite proxy.
      # e.g. https://mundial26-y28p.onrender.com
      - key: VITE_API_URL
        sync: false

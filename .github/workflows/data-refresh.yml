name: Keep API warm + refresh snapshot at game end

# Kickoffs are fixed and the snapshot remembers what's finished, so this only
# does work while a match is live: it wakes the API (instant live scores while
# people watch) and, at the final whistle, commits a fresh snapshot. Outside
# match windows it no-ops and the server sleeps (free tier preserved).
on:
  schedule:
    - cron: '*/10 * * * *'
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: node scripts/refresh.mjs
      - name: Commit snapshot if a game just ended
        run: |
          if git diff --quiet src/data/seed.json; then
            echo "snapshot unchanged — nothing to commit"
          else
            git config user.name "mundial26-bot"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add src/data/seed.json
            git commit -m "chore(data): refresh snapshot at game end"
            git pull --rebase --autostash origin main || true
            git push
          fi
